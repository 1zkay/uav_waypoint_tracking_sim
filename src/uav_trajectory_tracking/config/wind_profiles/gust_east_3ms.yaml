enabled: true
frame: ENU

# Gazebo ENU: 3 m/s base wind toward east with mild gusts.
linear_velocity_mps: [3.0, 0.0, 0.0]

wind_effects:
  force_approximation_scaling_factor: 1.0
  horizontal:
    magnitude:
      time_for_rise: 10.0
      sin:
        amplitude_percent: 0.05
        period: 60.0
      noise:
        type: gaussian
        mean: 0.0
        stddev: 0.0002
    direction:
      time_for_rise: 30.0
      sin:
        amplitude: 0.3
        period: 20.0
      noise:
        type: gaussian
        mean: 0.0
        stddev: 0.03
  vertical:
    noise:
      type: gaussian
      mean: 0.0
      stddev: 0.03
