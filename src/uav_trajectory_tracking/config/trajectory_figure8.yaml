# Host UAV figure-eight trajectory in PX4 local NED.
# x forward/north, y right/east, z down; negative z means altitude above home.
frame: NED
trajectory_type: parametric

control_rate_hz: 50.0
takeoff_warmup_s: 1.0
entry_hold_s: 0.2
acceptance_radius_m: 0.1
land_at_end: true
loop_route: false
yaw_mode: face_velocity

curve:
  duration_s: 40.0
  constants:
    cx: 0.0
    cy: 0.0
    cz: -5.0
    ax: 1.8
    ay: 3.0
  position:
    x: cx + ax * sin(2.0 * tau * u)
    y: cy + ay * sin(tau * u)
    z: cz
  velocity:
    x: ax * 2.0 * tau / duration_s * cos(2.0 * tau * u)
    y: ay * tau / duration_s * cos(tau * u)
    z: 0.0

visualization_samples: 180
