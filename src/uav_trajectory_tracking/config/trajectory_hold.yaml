# Host UAV hold trajectory in PX4 local NED.
# x forward/north, y right/east, z down; negative z means altitude above home.
frame: NED
trajectory_type: parametric

control_rate_hz: 10.0
takeoff_warmup_s: 1.5
land_at_end: false
loop_route: false
yaw_mode: fixed_north

curve:
  duration_s: 1.0
  constants:
    x0: 1.0
    y0: 2.0
    z0: -5.0
  position:
    x: x0
    y: y0
    z: z0
  velocity:
    x: 0.0
    y: 0.0
    z: 0.0

visualization_samples: 2
