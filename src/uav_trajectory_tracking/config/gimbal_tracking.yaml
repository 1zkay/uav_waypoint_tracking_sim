gimbal_target_tracker:
  ros__parameters:
    # Runtime wiring such as input topics, command topics, and PX4 system IDs
    # is supplied by launch files. Keep this file focused on reusable tuning.
    error_topic: /x500_0/gimbal_target_tracker/error
    residual_error_rate_topic: /x500_0/gimbal_target_tracker/residual_error_rate
    tracking_active_topic: /x500_0/gimbal_target_tracker/tracking_active
    lock_active_topic: /x500_0/gimbal_target_tracker/lock_active
    state_topic: /x500_0/gimbal_target_tracker/state

    # Detection selection.
    target_class_id: ""
    target_track_id: ""
    lock_target_track: true
    min_score: 0.2
    lost_timeout_s: 1.2
    detections_stream_timeout_s: 2.0

    # Camera-calibrated image-plane visual-servo loop. CameraInfo is preferred;
    # fallback intrinsics match the current Gazebo gimbal camera model.
    control_rate_hz: 30.0
    fallback_fx_px: 410.93927419797166
    fallback_fy_px: 410.93927419797166
    fallback_cx_px: 640.0
    fallback_cy_px: 360.0
    fallback_image_width: 1280.0
    fallback_image_height: 720.0
    deadband_angle_deg: 2.0
    # Close-range targets fill more of the image, making YOLO bbox centers
    # jitter more. Smooth the selected center and reduce servo gain as bbox
    # area grows to avoid aggressive gimbal swings near the target.
    target_center_filter_alpha: 0.35
    large_target_area_ratio_start: 0.08
    large_target_area_ratio_full: 0.28
    large_target_min_control_scale: 0.25
    # Standard seeker-style lock outputs. tracking_active means fresh selected
    # detections; lock_active means the target is centered and stable enough for
    # the outer interception guidance loop to trust the gimbal line of sight.
    # residual_error_rate publishes x/y as yaw/pitch image residual angular
    # rates in deg/s and z as a 0..1 lock-quality scalar.
    residual_error_rate_filter_alpha: 0.35
    lock_yaw_error_deg: 15.0
    lock_pitch_error_deg: 15.0
    lock_residual_error_rate_deg_s: 45.0
    unlock_yaw_error_deg: 20.0
    unlock_pitch_error_deg: 20.0
    unlock_residual_error_rate_deg_s: 70.0
    lock_confirm_s: 0.2
    lock_loss_grace_s: 0.4
    yaw_kp_s_inv: 1.5
    pitch_kp_s_inv: 1.5
    yaw_ki_s_inv2: 0.0
    pitch_ki_s_inv2: 0.0
    yaw_feedforward_deg_s: 0.0
    pitch_feedforward_deg_s: 0.0
    max_yaw_error_integral_deg_s: 90.0
    max_pitch_error_integral_deg_s: 90.0
    max_yaw_rate_deg_s: 45.0
    max_pitch_rate_deg_s: 45.0
    yaw_error_sign: 1.0
    pitch_error_sign: -1.0

    # Command limits.
    initial_yaw_deg: 0.0
    initial_pitch_deg: 0.0
    # Match the Gazebo/PX4 gimbal yaw joint range in px4_overlays/models.
    min_yaw_deg: -1.0e16
    max_yaw_deg: 1.0e16
    min_pitch_deg: -90.0
    max_pitch_deg: 90.0

    # PX4 gimbal manager command parameters that are not vehicle-specific.
    gimbal_device_id: 0.0
    gimbal_yaw_joint_name: cgo3_vertical_arm_joint
    gimbal_pitch_joint_name: cgo3_camera_joint
    # Keep the camera line of sight stabilized independently of vehicle motion.
    # earth_lock locks roll, pitch, and yaw in the PX4 gimbal manager frame.
    # body_follow is available only as a non-stabilized fallback.
    stabilization_mode: earth_lock
    # Use the high-rate PX4 gimbal manager setpoint topic for continuous servoing.
    # vehicle_command remains available as a compatibility fallback.
    command_interface: gimbal_manager_set_attitude
    # Only for command_interface=gimbal_manager_set_attitude: send yaw/pitch
    # angular velocity instead of absolute attitude quaternions. This preserves
    # continuous yaw motion across 0/360 deg.
    use_angular_velocity_setpoints: true

    # Safety/diagnostic behavior.
    hold_last_command_on_loss: true
    send_command_before_first_detection: true
    search_enabled: true
    search_after_lost_s: 0.8
    local_search_duration_s: 8.0
    search_yaw_rate_deg_s: 75.0
    search_pitch_rate_deg_s: 25.0
    search_initial_yaw_amplitude_deg: 30.0
    search_max_yaw_amplitude_deg: 360.0
    # Local search uses pitch offsets around the angle where the target was lost.
    local_search_pitch_bands_deg: [0.0, -12.0, 12.0, -24.0, 24.0, -40.0, 40.0]
    # Global search uses absolute pitch levels, starting near the horizon.
    global_search_pitch_levels_deg: [0.0, -25.0, 25.0, -50.0, 40.0, -75.0, 45.0, -90.0]
    configure_gimbal_manager: true
    configure_retry_period_s: 1.0
    # 0 means retry until PX4 accepts the gimbal manager configure command.
    configure_max_attempts: 0
