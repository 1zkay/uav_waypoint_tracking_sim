# Target UAV back-and-forth straight-line trajectory in its PX4 local NED frame.
# x forward/north, y right/east, z down; negative z means altitude above home.
frame: NED
trajectory_type: parametric

control_rate_hz: 10.0
takeoff_warmup_s: 1.5
acceptance_radius_m: 0.1
land_at_end: false
loop_route: true
yaw_mode: face_velocity

curve:
  # One full shuttle cycle: y_start -> y_start + segment_length -> y_start.
  # With segment_length=8 m and duration=45.714 s, the cruise speed is 0.35 m/s.
  duration_s: 45.714285714
  constants:
    x0: -4.0
    y_start: 4.0
    segment_length: 8.0
    z0: -5.0
  position:
    x: x0
    y: y_start + segment_length * (1.0 - abs(2.0 * u - 1.0))
    z: z0
  velocity:
    x: 0.0
    y: 2.0 * segment_length / duration_s * ((0.5 - u) / max(abs(0.5 - u), 1e-6))
    z: 0.0

visualization_samples: 80
