# Target UAV smooth loop trajectory in its PX4 local NED frame.
# x forward/north, y right/east, z down; negative z means altitude above home.
frame: NED
trajectory_type: parametric

control_rate_hz: 10.0
takeoff_warmup_s: 1.0
entry_hold_s: 0.2
acceptance_radius_m: 0.1
land_at_end: false
loop_route: true
yaw_mode: face_velocity

curve:
  duration_s: 50.0
  constants:
    cx: -1.0
    cy: 1.0
    cz: -5.0
    ax: 5.5
    ay: 7.5
    az: 3.0
  position:
    x: cx + ax * cos(tau * u)
    y: cy + ay * sin(tau * u)
    z: cz - az * sin(2.0 * tau * u)
  velocity:
    x: -ax * tau / duration_s * sin(tau * u)
    y: ay * tau / duration_s * cos(tau * u)
    z: -az * 2.0 * tau / duration_s * cos(2.0 * tau * u)

visualization_samples: 180
