gimbal_target_tracker:
  ros__parameters:
    # Runtime wiring such as input topics, command topics, and PX4 system IDs
    # is supplied by launch files. Keep this file focused on reusable tuning.
    error_topic: /x500_0/gimbal_target_tracker/error
    tracking_active_topic: /x500_0/gimbal_target_tracker/tracking_active

    # Detection selection.
    target_class_id: ""
    target_track_id: ""
    lock_target_track: true
    min_score: 0.35
    lost_timeout_s: 0.8

    # Camera-calibrated image-plane visual-servo loop. CameraInfo is preferred;
    # fallback intrinsics match the current Gazebo gimbal camera model.
    control_rate_hz: 20.0
    fallback_fx_px: 410.93927419797166
    fallback_fy_px: 410.93927419797166
    fallback_cx_px: 640.0
    fallback_cy_px: 360.0
    fallback_image_width: 1280.0
    fallback_image_height: 720.0
    deadband_angle_deg: 1.5
    yaw_rate_gain_s_inv: 0.18
    pitch_rate_gain_s_inv: 0.14
    max_yaw_rate_deg_s: 18.0
    max_pitch_rate_deg_s: 14.0
    yaw_error_sign: 1.0
    pitch_error_sign: 1.0

    # Command limits.
    initial_yaw_deg: 0.0
    initial_pitch_deg: 0.0
    min_yaw_deg: -90.0
    max_yaw_deg: 90.0
    min_pitch_deg: -90.0
    max_pitch_deg: 30.0

    # PX4 gimbal manager command parameters that are not vehicle-specific.
    gimbal_device_id: 0.0
    # vehicle: yaw relative to vehicle heading; earth: yaw relative to North.
    yaw_frame: vehicle
    # Use the high-rate PX4 gimbal manager setpoint topic for continuous servoing.
    # vehicle_command remains available as a compatibility fallback.
    command_interface: gimbal_manager_set_attitude

    # Safety/diagnostic behavior.
    hold_last_command_on_loss: true
    send_command_before_first_detection: false
    use_gimbal_feedback: true
    configure_gimbal_manager: true
    configure_retry_period_s: 1.0
    # 0 means retry until PX4 accepts the gimbal manager configure command.
    configure_max_attempts: 0
