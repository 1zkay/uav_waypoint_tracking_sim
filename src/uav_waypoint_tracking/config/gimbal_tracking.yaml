gimbal_target_tracker:
  ros__parameters:
    # Input and output topics are normally overridden by the launch file so that
    # this config can be reused with different camera or PX4 namespaces.
    detections_topic: /x500_0/yolo/detections
    image_topic: /x500_0/camera/image_raw
    vehicle_command_topic: /fmu/in/vehicle_command
    error_topic: /x500_0/gimbal_target_tracker/error
    tracking_active_topic: /x500_0/gimbal_target_tracker/tracking_active

    # Detection selection.
    target_class_id: ""
    min_score: 0.25
    lost_timeout_s: 0.5

    # Image-plane visual-servo loop.
    control_rate_hz: 20.0
    image_width: 640.0
    image_height: 480.0
    deadband_normalized: 0.03
    yaw_rate_gain_deg_s: 45.0
    pitch_rate_gain_deg_s: 35.0
    max_yaw_rate_deg_s: 60.0
    max_pitch_rate_deg_s: 45.0
    yaw_error_sign: 1.0
    pitch_error_sign: -1.0

    # Command limits.
    initial_yaw_deg: 0.0
    initial_pitch_deg: 0.0
    min_yaw_deg: -90.0
    max_yaw_deg: 90.0
    min_pitch_deg: -90.0
    max_pitch_deg: 30.0

    # PX4 gimbal manager command parameters.
    target_system: 1
    target_component: 1
    source_system: 1
    source_component: 1
    gimbal_device_id: 0.0
    gimbal_manager_flags: 0.0

    # Safety/diagnostic behavior.
    hold_last_command_on_loss: true
    send_command_before_first_detection: false
