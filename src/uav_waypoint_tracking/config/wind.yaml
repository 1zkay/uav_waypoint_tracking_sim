enabled: true
frame: ENU

# Gazebo world ENU wind velocity [east, north, up] in m/s.
# PX4 local NED equivalent is [north, east, down].
linear_velocity_mps: [3.0, 0.0, 0.0]

# Values below mirror Gazebo WindEffects SDF tags.
# time_for_rise / period are seconds; direction amplitude is radians.
wind_effects:
  force_approximation_scaling_factor: 1.0
  horizontal:
    magnitude:
      time_for_rise: 10.0
      sin:
        amplitude_percent: 0.05
        period: 60.0
      noise:
        type: gaussian
        mean: 0.0
        stddev: 0.0002
    direction:
      time_for_rise: 30.0
      sin:
        amplitude: 0.3
        period: 20.0
      noise:
        type: gaussian
        mean: 0.0
        stddev: 0.03
  vertical:
    noise:
      type: gaussian
      mean: 0.0
      stddev: 0.03
