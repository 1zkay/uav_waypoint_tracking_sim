yolo_tracker:
  ros__parameters:
    # Input/output topics are normally overridden by the launch file so this
    # config can be reused with different camera namespaces.
    weights_path: /home/zk/uav_waypoint_tracking_sim/yolov8s.pt
    image_topic: /x500_0/camera/image_raw
    tracks_topic: /x500_0/yolo/tracks
    annotated_image_topic: /x500_0/yolo/tracks_image

    # Ultralytics tracker backend. BoT-SORT handles moving-camera scenes better
    # than the ByteTrack baseline in this simulation.
    tracker_config: botsort.yaml

    # YOLO inference parameters.
    confidence_threshold: 0.35
    iou_threshold: 0.45
    image_size: 960
    max_detections: 100
    # The node keeps only the newest camera frame and runs inference from a
    # worker thread. max_inference_hz=0 disables explicit rate limiting.
    max_inference_hz: 90.0
    classes: ""
    device: ""

    # Publication behavior.
    publish_annotated_image: true
    publish_tracks: true
    publish_untracked_detections: false
