# Target UAV trajectory in its PX4 local NED frame.
# x forward/north, y right/east, z down; negative z means altitude above home.
# The target UAV is spawned in Gazebo in front of the stationary host UAV.
# This route keeps the target in front of x500_0 while moving laterally,
# slightly in depth, and slightly in altitude so the host gimbal must track it.
frame: NED
acceptance_radius_m: 0.6
dwell_time_s: 0.2
control_rate_hz: 10.0
takeoff_warmup_s: 1.5
land_at_end: false
yaw_mode: face_next_waypoint
waypoints:
  - [0.0, 0.0, -5.0]
  - [0.0, -4.0, -5.0]
  - [1.5, -3.0, -5.6]
  - [2.0, 0.0, -6.0]
  - [1.5, 3.0, -5.6]
  - [0.0, 4.0, -5.0]
  - [-1.5, 3.0, -4.4]
  - [-2.0, 0.0, -4.0]
  - [-1.5, -3.0, -4.4]
  - [0.0, -4.0, -5.0]
  - [1.5, -3.0, -5.6]
  - [2.0, 0.0, -6.0]
  - [1.5, 3.0, -5.6]
  - [0.0, 4.0, -5.0]
  - [-1.5, 3.0, -4.4]
  - [-2.0, 0.0, -4.0]
  - [-1.5, -3.0, -4.4]
  - [0.0, 0.0, -5.0]
