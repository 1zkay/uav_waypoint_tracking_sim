# Target UAV trajectory in its PX4 local NED frame.
# x forward/north, y right/east, z down; negative z means altitude above home.
# x500_1 is spawned at Gazebo north=5 m while x500_0 holds NED [1, 2, -5].
# This loop intentionally drives the target outside x500_0's gimbal FOV:
# roughly 4.2-8.2 m in front, about +/-12 m lateral offset, and about
# +/-2.2 m vertical offset relative to the host.
frame: NED
acceptance_radius_m: 0.4
dwell_time_s: 0.3
control_rate_hz: 10.0
takeoff_warmup_s: 1.5
land_at_end: false
loop_route: true
yaw_mode: face_next_waypoint
waypoints:
  - [2.0, 2.0, -5.0]
  - [2.0, -10.0, -5.0]
  - [3.2, -9.5, -6.4]
  - [4.2, -4.0, -7.2]
  - [4.0, 2.0, -6.4]
  - [4.2, 8.0, -7.2]
  - [3.2, 14.0, -6.4]
  - [2.0, 13.5, -5.0]
  - [0.8, 8.0, -3.6]
  - [0.2, 2.0, -2.8]
  - [0.8, -4.0, -3.6]
  - [2.0, -10.0, -5.0]
