# Target UAV trajectory in PX4 local NED.
# The waypoints approximate a vertical ellipse in the local x-z plane:
# x is horizontal north/forward, y is fixed, and z is down.
# Negative z means altitude above the takeoff point.
frame: NED
acceptance_radius_m: 0.8
dwell_time_s: 0.2
control_rate_hz: 10.0
takeoff_warmup_s: 1.5
land_at_end: true
yaw_mode: face_next_waypoint
waypoints:
  - [0.00, 0.0, -2.00]
  - [2.07, 0.0, -2.05]
  - [4.00, 0.0, -2.20]
  - [5.66, 0.0, -2.44]
  - [6.93, 0.0, -2.75]
  - [7.73, 0.0, -3.11]
  - [8.00, 0.0, -3.50]
  - [7.73, 0.0, -3.89]
  - [6.93, 0.0, -4.25]
  - [5.66, 0.0, -4.56]
  - [4.00, 0.0, -4.80]
  - [2.07, 0.0, -4.95]
  - [0.00, 0.0, -5.00]
  - [-2.07, 0.0, -4.95]
  - [-4.00, 0.0, -4.80]
  - [-5.66, 0.0, -4.56]
  - [-6.93, 0.0, -4.25]
  - [-7.73, 0.0, -3.89]
  - [-8.00, 0.0, -3.50]
  - [-7.73, 0.0, -3.11]
  - [-6.93, 0.0, -2.75]
  - [-5.66, 0.0, -2.44]
  - [-4.00, 0.0, -2.20]
  - [-2.07, 0.0, -2.05]
  - [0.00, 0.0, -2.00]
